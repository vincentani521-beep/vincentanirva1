<div class="phone-container">
  <header class="app-header">
    <div class="brand">
      <span class="brand-icon">💧</span>
      <span>AquaNet -Community App</span>
    </div>
    <div class="header-actions">
      <span class="icon">👤</span>
      <span class="icon">🔔</span>
    </div>
  </header>

  <main class="main-content">
    <h2 class="zone-title">Your Neighborhood (zone 4)</h2>
    
    <section class="dashboard-card">
      <div class="status-row">
        <span>Current Water Status:</span>
        <span class="status-badge">Active (until 9 pm)</span>
      </div>
      
      <div class="data-row">
        <span>Storage Level (Local Task):</span>
        <span>80%</span>
      </div>
      <div class="data-row">
        <span>Today's Usage (Household):</span>
        <span>220 Liters</span>
      </div>

      <div class="chart-section">
        <h4 class="chart-title">Daily Usage</h4>
        <div class="bar-chart">
          <div class="chart-column"><div class="bar mon"></div><span class="day-label">Mon</span></div>
          <div class="chart-column"><div class="bar tue"></div><span class="day-label">Tue</span></div>
          <div class="chart-column"><div class="bar wed"></div><span class="day-label">Wed</span></div>
          <div class="chart-column"><div class="bar thu"></div><span class="day-label">Thu</span></div>
          <div class="chart-column"><div class="bar fri"></div><span class="day-label">Fri</span></div>
          <div class="chart-column"><div class="bar sat"></div><span class="day-label">Sat</span></div>
          <div class="chart-column"><div class="bar sun"></div><span class="day-label">Sun</span></div>
        </div>
      </div>
    </section>

    <div class="action-buttons">
      <button class="btn btn-danger">Report a leaks</button>
      <button class="btn btn-secondary">View Rationing Schedule</button>
      <button class="btn btn-secondary">View Rationing Schedule</button> 
    </div>
  </main>

  <nav class="bottom-nav">
    <a class="nav-item"><span class="nav-icon">🏠</span>Home</a>
    <a class="nav-item"><span class="nav-icon">📊</span>Usage</a>
    <a class="nav-item"><span class="nav-icon">🗺️</span>Map</a>
    <a class="nav-item"><span class="nav-icon">⚠️</span>Alert</a>
    <a class="nav-item"><span class="nav-icon">•••</span>More</a>
  </nav>
</div>
